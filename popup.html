<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>The Attention Tollbooth</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <header class="hdr">
      <div class="brand">
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="30" width="8" height="14" rx="1.5" fill="#6c757d"/>
          <rect x="34" y="30" width="8" height="14" rx="1.5" fill="#6c757d"/>
          <rect x="6" y="20" width="36" height="6" rx="1.5" fill="#adb5bd"/>
          <circle cx="24" cy="12" r="4" fill="#dee2e6"/>
        </svg>
        <div class="brand-name">ATTENTION<br/>TOLLBOOTH</div>
      </div>
      <div class="streak" id="streak"></div>
    </header>

    <section class="stats">
      <div class="stat">
        <div class="stat-num" id="fp">0</div>
        <div class="stat-label">Focus Points</div>
      </div>
      <div class="stat">
        <div class="stat-num alt" id="tax">0</div>
        <div class="stat-label">Tax</div>
      </div>
      <div class="stat">
        <div class="stat-num teal" id="daily">0</div>
        <div class="stat-label">Today</div>
      </div>
    </section>

    <section class="tabs-section">
      <div class="section-title">Active Tolls</div>
      <div id="tabList" class="tab-list"></div>
      <div id="empty" class="empty" hidden>Clear focus. No active tolls.</div>
    </section>

    <footer class="ftr">
      <button id="reset" class="reset-btn">Reset all timers</button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
